<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kelime Seti 4 - Arapça Çalışma Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Amiri&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f4f8; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        .card-container { width: 875px; height: 625px; perspective: 2500px; cursor: pointer; }
        
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; box-shadow: 0 25px 75px rgba(0,0,0,0.1); border-radius: 50px; }
        .card-container.flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 50px; font-size: 80px; font-weight: 600; padding: 40px; box-sizing: border-box; }
        .card-front { background-color: white; color: #18395b; font-family: 'Amiri', serif; direction: rtl; }
        .card-back { background: linear-gradient(135deg, #2193b0, #6dd5ed); color: white; transform: rotateY(180deg); }

        .controls { margin-top: 50px; display: flex; gap: 40px; }
        button { 
            padding: 30px 60px; 
            font-size: 35px; 
            border: none; 
            background-color: #2c3e50; 
            color: white; 
            border-radius: 20px; 
            cursor: pointer; 
            transition: 0.3s; 
            font-family: 'Poppins'; 
        }
        button:hover { background-color: #34495e; transform: scale(1.05); }
        
        .counter { margin-top: 25px; font-size: 35px; color: #7f8c8d; }
    </style>
</head>
<body>

    <div class="card-container" onclick="this.classList.toggle('flipped')">
        <div class="card-inner">
            <div class="card-front" id="arabicText">اَلْخَادِمُ</div>
            <div class="card-back" id="turkishText">Hizmetçi</div>
        </div>
    </div>

    <div class="counter" id="counter">1 / 33</div>

    <div class="controls">
        <button onclick="prevCard()">Geri</button>
        <button onclick="nextCard()">İleri</button>
    </div>

    <script>
        const words = [
            { ar: "اَلْخَادِمُ", tr: "Hizmetçi" },
            { ar: "مُغْلَقٌ", tr: "Kapalı" },
            { ar: "مَفْتُوحَةٌ", tr: "Açık" },
            { ar: "قَائِمٌ", tr: "Ayakta duran" },
            { ar: "ضَخْمٌ", tr: "Kocaman" },
            { ar: "اَلسَّفِينَةُ", tr: "Gemi" },
            { ar: "غَنِيٌّ", tr: "Zengin" },
            { ar: "فَقِيرٌ", tr: "Yoksul" },
            { ar: "مُتْعَبٌ", tr: "Yorgun" },
            { ar: "اَلصُّنْدُوقُ", tr: "Sandık" },
            { ar: "طَلَعَ", tr: "Doğdu" },
            { ar: "اَلْفَجْرُ", tr: "Tan vakti" },
            { ar: "نَهَضَ", tr: "Kalktı" },
            { ar: "تَوَضَّأَ", tr: "Abdest aldı" },
            { ar: "صَلَّى", tr: "Namaz kıldı" },
            { ar: "لَبِسَ", tr: "Giydi" },
            { ar: "ثِيَابٌ", tr: "Elbiseler" },
            { ar: "قَبَّلَ", tr: "Öptü" },
            { ar: "اَلْحَارِسَانِ", tr: "İki bekçi" },
            { ar: "يَمْشِي", tr: "Yürüyor" },
            { ar: "رَأَى", tr: "Gördü" },
            { ar: "اشْتَرَى", tr: "Satın aldı" },
            { ar: "نَزَلَ", tr: "İndi" },
            { ar: "سَقَطَ", tr: "Düştü" },
            { ar: "صَاحَ", tr: "Öttü" },
            { ar: "اَلدِّيكُ", tr: "Horoz" },
            { ar: "لَمَعَ", tr: "Parladı" },
            { ar: "اَلْبَرْقُ", tr: "Şimşek" },
            { ar: "مَرِضَ", tr: "Hastalandı" },
            { ar: "بَرِئَ", tr: "İyileşti" },
            { ar: "ذَابَ", tr: "Eridi" },
            { ar: "رَقَدَ", tr: "Uyudu" },
            { ar: "حَصَدَ", tr: "Hasat etti" }
        ];

        let currentIndex = 0;

        function updateCard() {
            const card = document.querySelector('.card-container');
            card.classList.remove('flipped'); 
            
            setTimeout(() => {
                document.getElementById('arabicText').innerText = words[currentIndex].ar;
                document.getElementById('turkishText').innerText = words[currentIndex].tr;
                document.getElementById('counter').innerText = `${currentIndex + 1} / ${words.length}`;
            }, 200);
        }

        function nextCard() {
            if (currentIndex < words.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Alıştırma 2: Muttasıl Zamirler (Okuma) - Arapça Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Amiri&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f4f8; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 40px 0; }
        
        .exercise-container { width: 1000px; background: white; padding: 50px; border-radius: 50px; box-shadow: 0 25px 75px rgba(0,0,0,0.1); text-align: center; }
        
        .header { color: #d63031; font-size: 32px; font-weight: 600; margin-bottom: 10px; }
        .sub-header { font-size: 20px; color: #7f8c8d; margin-bottom: 40px; }

        /* Flashcard 3D Tasarımı */
        .card-scene {
            width: 700px;
            height: 350px;
            margin: 0 auto 40px auto;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-object {
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            position: relative;
        }

        .card-object.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 4px solid #f0f4f8;
            background: white;
        }

        .card-face-front {
            font-family: 'Amiri', serif;
            font-size: 85px;
            color: #18395b;
            direction: rtl;
        }

        .card-face-back {
            transform: rotateY(180deg);
            font-size: 45px;
            color: #2c3e50;
            font-weight: 600;
            background: #fff0f0; 
            border-color: #ffeaea;
        }

        .controls { display: flex; justify-content: center; align-items: center; gap: 30px; margin-bottom: 30px; }

        .nav-btn {
            background-color: #ecf0f1; color: #2c3e50; border: none; border-radius: 50%;
            width: 80px; height: 80px; font-size: 35px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }

        .nav-btn:hover { background-color: #bdc3c7; transform: scale(1.1); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

        .counter { font-size: 28px; color: #7f8c8d; font-weight: 600; min-width: 120px; }

        .action-btn { 
            padding: 20px 60px; font-size: 28px; border: none; 
            background-color: #3498db; color: white; border-radius: 20px; 
            cursor: pointer; transition: 0.3s; font-family: 'Poppins'; 
            display: none; margin: 0 auto; text-decoration: none;
        }
        .action-btn:hover { background-color: #2980b9; transform: scale(1.05); }

    </style>
</head>
<body>

    <div class="exercise-container">
        <div class="header">B- Yüksek sesle okuyunuz:</div>
        <div class="sub-header">Cümleyi okuduktan sonra anlamını görmek için karta tıklayın.</div>
        
        <div class="card-scene" onclick="flipCard()">
            <div class="card-object" id="flashcard">
                <div class="card-face card-face-front" id="card-front"></div>
                <div class="card-face card-face-back" id="card-back"></div>
            </div>
        </div>

        <div class="controls">
            <button class="nav-btn" id="prev-btn" onclick="prevCard()">←</button>
            <div class="counter" id="progress">1 / 10</div>
            <button class="nav-btn" id="next-btn" onclick="nextCard()">→</button>
        </div>

        <a href="11-bitisik-zamirler-3.html" class="action-btn" id="finish-btn">Diğer Antrenmana Geç</a>
    </div>

    <script>
        const cards = [
            { ar: "كِتَابُهُ جَدِيدٌ.", tr: "Onun kitabı yenidir." },
            { ar: "مَكْتَبُهَا صَغِيرٌ.", tr: "Onun bürosu küçüktür." },
            { ar: "بَيْتُهُمْ وَاسِعٌ.", tr: "Onların evi geniştir." },
            { ar: "حَدِيقَتُهُمْ صَغِيرَةٌ.", tr: "Onların bahçesi küçüktür." },
            { ar: "مِحْفَظَتُكِ غَالِيَةٌ.", tr: "Senin çantan pahalıdır." },
            { ar: "مُدَرِّسُكُمْ شَابٌّ.", tr: "Öğretmeniniz gençtir." },
            { ar: "مُدِيرُهُمْ مُسِنٌّ.", tr: "Onların müdürü yaşlıdır." },
            { ar: "أُمُّكُمَا قَصِيرَةٌ.", tr: "İkinizin annesi kısa boyludur." },
            { ar: "أُخْتُهُنَّ طَوِيلَةٌ.", tr: "Onların kız kardeşi uzun boyludur." },
            { ar: "حَقِيبَتُكِ ثَقِيلَةٌ.", tr: "Bavulun ağırdır." }
        ];

        let currentIndex = 0;
        const flashcard = document.getElementById('flashcard');

        function updateCard() {
            flashcard.classList.remove('is-flipped');
            
            setTimeout(() => {
                document.getElementById('card-front').innerHTML = cards[currentIndex].ar;
                document.getElementById('card-back').innerHTML = cards[currentIndex].tr;
                document.getElementById('progress').innerText = `${currentIndex + 1} / ${cards.length}`;

                document.getElementById('prev-btn').disabled = currentIndex === 0;
                
                if (currentIndex === cards.length - 1) {
                    document.getElementById('next-btn').disabled = true;
                    document.getElementById('finish-btn').style.display = "inline-block";
                } else {
                    document.getElementById('next-btn').disabled = false;
                }
            }, 150);
        }

        function flipCard() {
            flashcard.classList.toggle('is-flipped');
        }

        function nextCard() {
            if (currentIndex < cards.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        updateCard();
    </script>
</body>
</html>

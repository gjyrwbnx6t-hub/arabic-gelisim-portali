<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Alıştırma 5: İzafe (Ev Ödevi) - Arapça Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Amiri&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f4f8; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        .exercise-container { width: 1000px; background: white; padding: 60px; border-radius: 50px; box-shadow: 0 25px 75px rgba(0,0,0,0.1); text-align: center; }
        
        .badge { 
            background-color: #ff4757; 
            color: white; 
            padding: 15px 60px; 
            border-radius: 40px; 
            font-size: 45px; 
            font-weight: 600; 
            display: inline-block; 
            margin-bottom: 50px; 
        }

        .section { margin-bottom: 50px; }
        
        .instruction { font-size: 32px; color: #2c3e50; font-weight: 600; margin-bottom: 20px; }
        
        .arabic-words { 
            font-family: 'Amiri', serif; 
            font-size: 75px; 
            color: #d63031; 
            direction: rtl; 
            line-height: 1.6; 
        }

        .turkish-note {
            font-family: 'Poppins', sans-serif;
            font-size: 30px;
            color: #7f8c8d;
            font-weight: 400;
        }
        
        .action-btn { 
            padding: 25px 70px; font-size: 35px; border: none; 
            background-color: #2c3e50; color: white; border-radius: 20px; 
            cursor: pointer; transition: 0.3s; font-family: 'Poppins'; 
            text-decoration: none; display: inline-block; margin-top: 20px;
        }
        .action-btn:hover { background-color: #34495e; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="exercise-container">
        <div class="badge">EV ÖDEVİ</div>
        
        <div class="section">
            <div class="instruction">A- Şu isimleri muzâf yapınız:</div>
            <div class="arabic-words">
                قَلَم - بَاب - حِصَان - مِصْبَاح - جِدَار
            </div>
        </div>

        <div class="section">
            <div class="instruction">B- Şu isimleri muzâfun ileyh yapınız:</div>
            <div class="arabic-words">
                اَلتِّلْمِيذ - اَلْمَدْرَسَة - اَلْغُرْفَة - اَلْمُزَارِع <span class="turkish-note">(çiftçi)</span> - اَلْبَيْت
            </div>
        </div>
        
        <a href="antrenmanlar/antrenman-gun-3.html" class="action-btn">Antrenmanları Bitir</a>
    </div>

</body>
</html>

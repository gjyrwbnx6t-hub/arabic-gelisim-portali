<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>A Alıştırması: İsim Cümlesi - Arapça Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Amiri&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f4f8; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 40px 20px; }
        
        nav { 
            background-color: #2c3e50; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: inline-block; width: 100%; max-width: 1200px; margin-bottom: 20px; overflow: hidden; 
        }
        nav a { float: left; color: white; padding: 16px 20px; text-decoration: none; transition: 0.3s; font-weight: 600; }
        nav a:hover { background-color: #34495e; color: #3498db; }

        .exercise-container { width: 100%; max-width: 1200px; background: white; padding: 50px; border-radius: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); text-align: center; }
        
        .main-title { color: #e74c3c; font-size: 32px; font-weight: 600; margin-bottom: 10px; }
        .instruction { font-size: 20px; color: #7f8c8d; margin-bottom: 40px; font-weight: 600; }

        .grid-container {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; direction: rtl; 
        }

        .sentence-card {
            background: #f8f9fa; border: 2px solid #ecf0f1; border-radius: 20px; padding: 30px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.3s; position: relative; gap: 15px;
        }

        .sentence-card:hover { border-color: #bdc3c7; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transform: translateY(-5px); }

        .ar-container {
            display: flex; gap: 40px; align-items: center; justify-content: center;
        }

        .word-box {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .ar-text {
            font-family: 'Amiri', serif; font-size: 45px; color: #18395b; transition: 0.4s; padding: 0 5px;
        }

        .line-single { text-decoration: underline; text-decoration-thickness: 4px; text-decoration-color: #27ae60; color: #27ae60; }
        .line-double { text-decoration: underline double; text-decoration-thickness: 4px; text-decoration-color: #3498db; color: #3498db; }
        
        .line-wrong { color: #e74c3c; animation: shake 0.4s; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } 100% { transform: translateX(0); } }

        .tr-text { font-family: 'Poppins', sans-serif; font-size: 18px; color: #95a5a6; direction: ltr; margin-top: 10px; }
        .tr-note { font-family: 'Poppins', sans-serif; font-size: 14px; background-color: #fdedec; color: #e74c3c; padding: 4px 10px; border-radius: 8px; font-weight: 600; }

        /* Seçim Butonları */
        .btn-group { display: flex; gap: 10px; direction: ltr; }
        
        .choice-btn {
            background-color: white; border: 2px solid #bdc3c7; color: #7f8c8d;
            padding: 8px 15px; font-size: 14px; border-radius: 8px; cursor: pointer;
            transition: 0.3s; font-family: 'Poppins', sans-serif; font-weight: 600;
        }
        .choice-btn:hover { background-color: #bdc3c7; color: white; }
        .choice-btn.correct { background-color: #27ae60; border-color: #27ae60; color: white; pointer-events: none; }
        .choice-btn.correct-haber { background-color: #3498db; border-color: #3498db; color: white; pointer-events: none; }
        .choice-btn.wrong { background-color: #e74c3c; border-color: #e74c3c; color: white; }
        .choice-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .nav-buttons { display: flex; justify-content: center; gap: 20px; margin-top: 50px; }
        .action-btn { 
            padding: 15px 30px; font-size: 20px; border: none; 
            background-color: #2c3e50; color: white; border-radius: 15px; 
            cursor: pointer; transition: 0.3s; font-family: 'Poppins'; text-decoration: none;
        }
        .action-btn:hover { transform: scale(1.05); }
        .btn-next { background-color: #3498db; }
        .btn-next:hover { background-color: #2980b9; }

        #results { display: none; margin-top: 30px; font-size: 35px; color: #27ae60; font-weight: 600; }

        @media (max-width: 900px) { .grid-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav>
        <a href="../../antrenmanlar/antrenman-gun-4.html">← 4. Güne Dön</a>
    </nav>

    <div class="exercise-container">
        <div class="main-title">A- ALIŞTIRMASI: İSİM CÜMLESİ</div>
        <div class="instruction">Her kelimenin altındaki butonları kullanarak Mübtedâ ve Haber'i doğru bir şekilde eşleştirin:</div>
        
        <div class="grid-container" id="quiz-grid"></div>

        <div id="results">Tebrikler! Tüm cümleleri başarıyla incelediniz. 🏆</div>

        <div class="nav-buttons">
            <button class="action-btn" onclick="location.reload()" style="background-color: #7f8c8d;">Baştan Başla</button>
            <a href="15-antrenman-isim-cumlesi-2.html" class="action-btn btn-next">Sonraki Antrenmana Geç</a>
        </div>
    </div>

    <script>
        const sentences = [
            { mubteda: "اَلْبَابُ", haber: "مَفْتُوحٌ.", tr: "Kapı açıktır." },
            { mubteda: "اَلنَّافِذَةُ", haber: "مُغْلَقَةٌ.", tr: "Pencere kapalıdır." },
            { mubteda: "اَلْبَابَانِ", haber: "مَفْتُوحَانِ.", tr: "İki kapı açıktır." },
            { mubteda: "اَلنَّافِذَتَانِ", haber: "مُغْلَقَتَانِ.", tr: "İki pencere kapalıdır." },
            { mubteda: "اَلْكِتَابُ", haber: "غَالٍ.", tr: "Kitap pahalıdır.", note: "pahalı" },
            { mubteda: "اَلْأُسْتَاذُ", haber: "عَالِمٌ.", tr: "Hoca alimdir." },
            { mubteda: "اَلْكُتُبُ", haber: "غَالِيَةٌ.", tr: "Kitaplar pahalıdır." },
            { mubteda: "اَلْأَشْجَارُ", haber: "كَثِيرَةٌ.", tr: "Ağaçlar çoktur." },
            { mubteda: "اَلشَّجَرَةُ", haber: "قَصِيرَةٌ.", tr: "Ağaç kısadır." },
            { mubteda: "اَلشَّجَرَتَانِ", haber: "قَصِيرَتَانِ.", tr: "İki ağaç kısadır." },
            { mubteda: "اَلْأَشْجَارُ", haber: "قَصِيرَاتٌ.", tr: "Ağaçlar kısadır." },
            { mubteda: "اَلشَّارِعُ", haber: "ضَيِّقٌ.", tr: "Cadde dardır." }
        ];

        const grid = document.getElementById('quiz-grid');
        let completedSentences = 0;

        sentences.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'sentence-card';
            
            const noteHtml = item.note ? `<span class="tr-note">${item.note}</span>` : '';

            card.innerHTML = `
                <div class="ar-container">
                    
                    <div class="word-box">
                        <span class="ar-text" id="word1-${index}">${item.mubteda}</span>
                        <div class="btn-group" id="group1-${index}">
                            <button class="choice-btn" onclick="checkAnswer(${index}, 1, 'mubteda', this)">Mübtedâ</button>
                            <button class="choice-btn" onclick="checkAnswer(${index}, 1, 'haber', this)">Haber</button>
                        </div>
                    </div>

                    <div class="word-box">
                        <span class="ar-text" id="word2-${index}">${item.haber}</span>
                        <div class="btn-group" id="group2-${index}">
                            <button class="choice-btn" onclick="checkAnswer(${index}, 2, 'mubteda', this)">Mübtedâ</button>
                            <button class="choice-btn" onclick="checkAnswer(${index}, 2, 'haber', this)">Haber</button>
                        </div>
                    </div>

                </div>
                ${noteHtml}
                <div class="tr-text">${index + 1}- ${item.tr}</div>
            `;
            grid.appendChild(card);
        });

        // 1. Kelime Mübtedâ, 2. Kelime Haber'dir.
        let correctCounts = new Array(sentences.length).fill(0);

        function checkAnswer(sentenceIndex, wordIndex, selectedType, btnElement) {
            const wordSpan = document.getElementById(`word${wordIndex}-${sentenceIndex}`);
            const btnGroup = document.getElementById(`group${wordIndex}-${sentenceIndex}`);
            const buttons = btnGroup.querySelectorAll('button');

            // Doğru mantığı: word1 ise mübteda olmalı, word2 ise haber olmalı.
            let isCorrect = (wordIndex === 1 && selectedType === 'mubteda') || (wordIndex === 2 && selectedType === 'haber');

            if (isCorrect) {
                if (selectedType === 'mubteda') {
                    btnElement.classList.add('correct');
                    wordSpan.classList.add('line-single');
                } else {
                    btnElement.classList.add('correct-haber');
                    wordSpan.classList.add('line-double');
                }
                buttons.forEach(b => b.disabled = true);
                
                correctCounts[sentenceIndex]++;
                if(correctCounts[sentenceIndex] === 2) {
                    completedSentences++;
                    if(completedSentences === sentences.length) {
                        document.getElementById('results').style.display = "block";
                        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                    }
                }
            } else {
                btnElement.classList.add('wrong');
                wordSpan.classList.add('line-wrong');
                
                setTimeout(() => {
                    btnElement.classList.remove('wrong');
                    wordSpan.classList.remove('line-wrong');
                }, 500);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>F Alıştırması: İsim Cümlesi Eşleştirme - Arapça Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Amiri&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f4f8; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 40px 20px; }
        
        nav { 
            background-color: #2c3e50; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: inline-block; width: 100%; max-width: 1200px; margin-bottom: 20px; overflow: hidden; 
        }
        nav a { float: left; color: white; padding: 16px 20px; text-decoration: none; transition: 0.3s; font-weight: 600; }
        nav a:hover { background-color: #34495e; color: #3498db; }

        .exercise-container { width: 100%; max-width: 1200px; background: white; padding: 50px; border-radius: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); text-align: center; }
        
        .main-title { color: #e74c3c; font-size: 32px; font-weight: 600; margin-bottom: 10px; }
        .instruction { font-size: 18px; color: #7f8c8d; margin-bottom: 40px; font-weight: 600; }

        /* Eşleştirme Alanı */
        .match-container {
            display: flex;
            justify-content: space-between;
            gap: 50px;
            direction: rtl; /* Arapça düzen: Sağda Mübteda, Solda Haber */
        }

        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .col-title {
            font-size: 24px; color: #2c3e50; font-weight: bold; margin-bottom: 15px;
        }

        .match-box {
            background-color: #f8f9fa;
            border: 3px solid #dcdde1;
            border-radius: 15px;
            padding: 15px 20px;
            font-family: 'Amiri', serif;
            font-size: 35px;
            color: #18395b;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .match-box:hover {
            border-color: #3498db;
            transform: scale(1.02);
        }

        /* Seçili Kutu */
        .match-box.selected {
            border-color: #e74c3c;
            background-color: #fdedec;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.2);
        }

        /* Hata Görünümü */
        .match-box.wrong { border-color: #e74c3c; color: #e74c3c; }

        .controls-wrapper { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 50px; }
        .action-btn { 
            padding: 15px 30px; font-size: 20px; border: none; 
            background-color: #2c3e50; color: white; border-radius: 15px; 
            cursor: pointer; transition: 0.3s; font-family: 'Poppins'; text-decoration: none;
        }
        .action-btn:hover { transform: scale(1.05); }
        .btn-check { background-color: #27ae60; padding: 15px 50px; font-size: 22px; }
        .btn-check:hover { background-color: #2ecc71; }
        .btn-prev { background-color: #7f8c8d; }
        .btn-prev:hover { background-color: #95a5a6; }
        .btn-next { background-color: #3498db; }
        .btn-next:hover { background-color: #2980b9; }

        #results { display: none; margin-top: 30px; font-size: 35px; color: #18395b; font-weight: 600; }

        @media (max-width: 768px) {
            .match-container { flex-direction: column; gap: 30px; }
            .ar-text { font-size: 30px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="4-gun-antrenmanlari.html">← 4. Güne Dön</a>
    </nav>

    <div class="exercise-container">
        <div class="main-title">F- ALIŞTIRMASI: CÜMLELER KURUNUZ</div>
        <div class="instruction">
            Eşleştirme yapmak için bir kutuya, ardından diğer sütundaki kutuya tıklayın.<br>
            <span style="color:#e74c3c; font-size:14px;">(Eşleşmeyi iptal etmek için eşleşmiş kutuya tekrar tıklayabilirsiniz.)</span>
        </div>
        
        <div class="match-container">
            <div class="column" id="col-mubteda">
                <div class="col-title">Mübtedâ</div>
                </div>

            <div class="column" id="col-haber">
                <div class="col-title">Haber</div>
                </div>
        </div>

        <div class="controls-wrapper" id="check-wrapper">
            <button class="action-btn btn-check" onclick="checkAnswers()">Cevapları Kontrol Et</button>
        </div>

        <div id="results"></div>

        <div class="controls-wrapper">
            <a href="15-antrenman-isim-cumlesi-5.html" class="action-btn btn-prev">Önceki Antrenman</a>
            <a href="15-antrenman-isim-cumlesi-7.html" class="action-btn btn-next">Sonraki Antrenmana Geç</a>
        </div>
    </div>

    <script>
        const mubtedaList = [
            { id: 's0', text: 'اَلنَّافِذَةُ' },
            { id: 's1', text: 'اَلْأَبْوَابُ' },
            { id: 's2', text: 'اَلْبَابَانِ' },
            { id: 's3', text: 'اَلتَّاجِرَانِ' },
            { id: 's4', text: 'اَلطَّبِيبَاتُ' },
            { id: 's5', text: 'اَلْمُسْلِمَاتُ' },
            { id: 's6', text: 'اَلطَّبَّاخُونَ' },
            { id: 's7', text: 'اَلنَّجَّارُونَ' },
            { id: 's8', text: 'اَلطَّبَّاخَتَانِ' },
            { id: 's9', text: 'اَلْحَدَّادُونَ' },
            { id: 's10', text: 'اَلْمُمَرِّضَتَانِ' },
            { id: 's11', text: 'اَلتِّلْمِيذُ' }
        ];

        const haberList = [
            { id: 'p0', text: 'غَنِيَّانِ' },
            { id: 'p1', text: 'مَقْفُولَانِ' },
            { id: 'p2', text: 'مَفْتُوحَةٌ' },
            { id: 'p3', text: 'مُغْلَقَةٌ' },
            { id: 'p4', text: 'مَاهِرُونَ' },
            { id: 'p5', text: 'جَالِسُونَ' },
            { id: 'p6', text: 'مُهَذَّبَاتٌ' },
            { id: 'p7', text: 'صَائِمَاتٌ' },
            { id: 'p8', text: 'مُتْعَبُونَ' },
            { id: 'p9', text: 'مَاهِرَتَانِ' },
            { id: 'p10', text: 'مُجِدٌّ' },
            { id: 'p11', text: 'مُهَذَّبَتَانِ' }
        ];

        // Anlam ve dilbilgisi kurallarına uyan doğru eşleştirme kombinasyonları
        const validPairs = {
            's0': ['p2', 'p3'], // Pencere: açık/kapalı
            's1': ['p2', 'p3'], // Kapılar: açık/kapalı
            's2': ['p1'],       // İki Kapı: Kilitlidir
            's3': ['p0'],       // İki Tacir: Zengindir
            's4': ['p6', 'p7'], // Kadın Doktorlar: edepli/oruçlu
            's5': ['p6', 'p7'], // Kadın Müslümanlar: edepli/oruçlu
            's6': ['p4', 'p5', 'p8'], // Erkek Aşçılar: maharetli/oturan/yorgun
            's7': ['p4', 'p5', 'p8'], // Marangozlar: maharetli/oturan/yorgun
            's8': ['p9', 'p11'],      // İki Kadın Aşçı: maharetli/edepli
            's9': ['p4', 'p5', 'p8'], // Demirciler: maharetli/oturan/yorgun
            's10': ['p9', 'p11'],     // İki Hemşire: maharetli/edepli
            's11': ['p10']            // Öğrenci: Çalışkandır
        };

        // 12 farklı pastel eşleşme rengi
        const colors = [
            '#ffb3ba', '#ffdfba', '#ffffba', '#baffc9', 
            '#bae1ff', '#e6e6fa', '#f0e68c', '#ffc0cb', 
            '#dda0dd', '#98fb98', '#afeeee', '#f5deb3'
        ];
        
        let colorIndex = 0;
        let selectedMubteda = null;
        let selectedHaber = null;
        let matches = []; // [{ mubtedaId, haberId, color }]

        function renderBoxes() {
            const colM = document.getElementById('col-mubteda');
            const colH = document.getElementById('col-haber');
            colM.innerHTML = '<div class="col-title">Mübtedâ</div>';
            colH.innerHTML = '<div class="col-title">Haber</div>';

            mubtedaList.forEach(item => {
                const isMatched = matches.find(m => m.mubtedaId === item.id);
                const isSelected = selectedMubteda === item.id;
                const bgColor = isMatched ? isMatched.color : (isSelected ? '' : '#f8f9fa');
                
                colM.innerHTML += `
                    <div class="match-box ${isSelected ? 'selected' : ''}" 
                         style="background-color: ${bgColor};" 
                         onclick="handleBoxClick('mubteda', '${item.id}')">
                        ${item.text}
                    </div>
                `;
            });

            haberList.forEach(item => {
                const isMatched = matches.find(m => m.haberId === item.id);
                const isSelected = selectedHaber === item.id;
                const bgColor = isMatched ? isMatched.color : (isSelected ? '' : '#f8f9fa');

                colH.innerHTML += `
                    <div class="match-box ${isSelected ? 'selected' : ''}" 
                         style="background-color: ${bgColor};" 
                         onclick="handleBoxClick('haber', '${item.id}')">
                        ${item.text}
                    </div>
                `;
            });
        }

        function handleBoxClick(type, id) {
            // Tıklanan kutu zaten eşleşmiş mi? Eğer eşleşmişse boz.
            const existingMatchIndex = matches.findIndex(m => m.mubtedaId === id || m.haberId === id);
            if (existingMatchIndex !== -1) {
                matches.splice(existingMatchIndex, 1);
                renderBoxes();
                return;
            }

            // Seçim işlemleri
            if (type === 'mubteda') {
                selectedMubteda = (selectedMubteda === id) ? null : id; // Çift tıklarsa seçimi bırak
            } else {
                selectedHaber = (selectedHaber === id) ? null : id;
            }

            // İkisi de seçildiyse eşleştir
            if (selectedMubteda && selectedHaber) {
                matches.push({
                    mubtedaId: selectedMubteda,
                    haberId: selectedHaber,
                    color: colors[colorIndex % colors.length]
                });
                colorIndex++;
                selectedMubteda = null;
                selectedHaber = null;
            }

            renderBoxes();
        }

        function checkAnswers() {
            if (matches.length < 12) {
                alert("Lütfen önce tüm kelimeleri eşleştirin!");
                return;
            }

            let correctCount = 0;
            
            // Kullanıcının yaptığı eşleşmeleri kontrol et
            matches.forEach(match => {
                const validHaberList = validPairs[match.mubtedaId];
                if (validHaberList.includes(match.haberId)) {
                    correctCount++;
                }
            });

            document.getElementById('check-wrapper').style.display = "none";
            const resultsDiv = document.getElementById('results');
            resultsDiv.style.display = "block";
            
            if (correctCount === 12) {
                resultsDiv.innerHTML = `Mükemmel! Tüm eşleştirmeler doğru. 🏆`;
                resultsDiv.style.color = "#27ae60";
            } else {
                resultsDiv.innerHTML = `Skor: ${correctCount} / 12 doğru.<br><span style="font-size:18px; color:#e74c3c;">(Yanlış eşleştirmeleriniz var, 'Baştan Başla' butonuyla tekrar deneyebilirsiniz.)</span>`;
                resultsDiv.style.color = "#e74c3c";
            }

            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        // İlk Yükleme
        renderBoxes();
    </script>
</body>
</html>

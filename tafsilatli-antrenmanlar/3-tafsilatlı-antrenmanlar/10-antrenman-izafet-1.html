<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Alıştırma 1: İzafe (Muzâfı Bulma) - Arapça Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Amiri&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f4f8; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        .exercise-container { width: 1000px; background: white; padding: 50px; border-radius: 50px; box-shadow: 0 25px 75px rgba(0,0,0,0.1); text-align: center; }
        
        .header { color: #d63031; font-size: 32px; font-weight: 600; margin-bottom: 40px; }
        
        .example-box { background: #f8f9fa; padding: 20px; border-radius: 20px; margin-bottom: 30px; font-size: 24px; color: #7f8c8d; }

        /* Tıklanabilir Kelime Kutucukları */
        .word-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            direction: rtl; /* Arapça sağdan sola dizilim için */
        }

        .word-box {
            background: white;
            border: 4px solid #f0f4f8;
            border-radius: 25px;
            padding: 15px 35px;
            font-family: 'Amiri', serif;
            font-size: 75px;
            color: #18395b;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .word-box:hover { border-color: #2193b0; transform: translateY(-5px); }

        /* Doğru ve Yanlış Durumları */
        .word-box.correct { border-color: #27ae60; background-color: #eafaf1; }
        .word-box.wrong { border-color: #e74c3c; background-color: #fdedec; opacity: 0.7; }
        .word-box.disabled { pointer-events: none; }

        .meaning-box { font-size: 35px; color: #2980b9; font-weight: 600; min-height: 50px; margin-bottom: 20px; opacity: 0; transition: 0.3s; }
        .meaning-box.show { opacity: 1; }

        .explanation { color: #e67e22; font-weight: 600; font-size: 24px; display: none; margin-bottom: 20px; }
        
        button { 
            padding: 25px 70px; font-size: 35px; border: none; 
            background-color: #2c3e50; color: white; border-radius: 20px; 
            cursor: pointer; transition: 0.3s; font-family: 'Poppins'; 
            display: none;
        }
        button:hover { background-color: #34495e; transform: scale(1.05); }

        .counter { margin-top: 25px; font-size: 30px; color: #7f8c8d; margin-bottom: 20px; }
        #results { display: none; }
        .score-text { font-size: 60px; color: #18395b; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div class="exercise-container" id="game-area">
        <div class="header">Cümledeki "Muzâf" (Tamlanan) olan kelimeye dokununuz:</div>
        
        <div class="example-box">
            💡 Kural: İsim tamlamasında ilk kelime Muzâf'tır ve başında 'Elif-Lam' (ال) takısı bulunmaz.
        </div>

        <div id="quiz-part">
            <div class="counter" id="progress">1 / 10</div>
            
            <div class="word-container" id="word-container"></div>
            
            <div class="meaning-box" id="word-meaning"></div>
            
            <div class="explanation" id="exp-text"></div>
            
            <button id="action-btn" onclick="nextQuestion()">Sıradaki</button>
        </div>

        <div id="results">
            <div class="score-text">Mükemmel!</div>
            <div class="score-text" id="final-score">Skor: 0 / 10</div>
            <button onclick="location.href='/Users/azizavci/Desktop/arapca calisma portali/tafsilatli-antrenmanlar/3-tafsilatlı-antrenmanlar/10-antrenman-izafet-2.html'" style="display:inline-block">2. İzafe Antrenmanına Geç</button>
        </div>
    </div>

    <script>
        function normalizeArabic(text) {
            return text.replace(/[\u064B-\u0652]/g, "").trim();
        }

        const questions = [
            { q: "بَابُ الْبَيْتِ مَفْتُوحٌ", a: "بَابُ", tr: "Evin kapısı açıktır." },
            { q: "كِتَابُ الْمُدَرِّسِ سَمِيكٌ", a: "كِتَابُ", tr: "Öğretmenin kitabı kalındır." },
            { q: "دَفْتَرُ الْمُدَرِّسِ جَدِيدٌ", a: "دَفْتَرُ", tr: "Öğretmenin defteri yenidir." },
            { q: "مَكْتَبُ الْمُدِيرِ وَاسِعٌ", a: "مَكْتَبُ", tr: "Müdürün bürosu geniştir." },
            { q: "قَمِيصُ الرَّجُلِ نَظِيفٌ", a: "قَمِيصُ", tr: "Adamın gömleği temizdir." },
            { q: "نَظَّارَةُ التِّلْمِيذِ جَدِيدَةٌ", a: "نَظَّارَةُ", tr: "Öğrencinin gözlüğü yenidir." },
            { q: "غَسَّالَةُ الْمُدِيرِ كَبِيرَةٌ", a: "غَسَّالَةُ", tr: "Müdürün çamaşır makinesi büyüktür." },
            { q: "مِحْفَظَةُ التِّلْمِيذِ قَدِيمَةٌ", a: "مِحْفَظَةُ", tr: "Öğrencinin çantası eskidir." },
            { q: "حَدِيقَةُ الْبَيْتِ وَاسِعَةٌ", a: "حَدِيقَةُ", tr: "Evin bahçesi geniştir." },
            { q: "غُرْفَةُ النَّوْمِ ضَيِّقَةٌ", a: "غُرْفَةُ", tr: "Yatak odası dardır." }
        ];

        let currentIndex = 0;
        let score = 0;

        function updateQuestion() {
            const q = questions[currentIndex];
            document.getElementById('progress').innerText = `${currentIndex + 1} / ${questions.length}`;
            
            const container = document.getElementById('word-container');
            container.innerHTML = ""; 
            
            const words = q.q.split(" ");
            words.forEach(word => {
                const wordBox = document.createElement("div");
                wordBox.className = "word-box";
                wordBox.innerText = word;
                wordBox.onclick = () => checkAnswer(wordBox, word);
                container.appendChild(wordBox);
            });

            document.getElementById('action-btn').style.display = "none";
            document.getElementById('word-meaning').classList.remove('show');
            document.getElementById('exp-text').style.display = "none";
        }

        function checkAnswer(selectedBox, selectedWord) {
            const allBoxes = document.querySelectorAll('.word-box');
            allBoxes.forEach(box => box.classList.add('disabled'));

            const meaningBox = document.getElementById('word-meaning');
            const expText = document.getElementById('exp-text');
            const actionBtn = document.getElementById('action-btn');

            meaningBox.innerText = `Anlamı: ${questions[currentIndex].tr}`;
            meaningBox.classList.add('show');

            if (normalizeArabic(selectedWord) === normalizeArabic(questions[currentIndex].a)) {
                selectedBox.classList.add('correct');
                score++;
                actionBtn.innerText = "Sıradaki";
                actionBtn.style.display = "inline-block";
            } else {
                selectedBox.classList.add('wrong');
                allBoxes.forEach(box => {
                    if (normalizeArabic(box.innerText) === normalizeArabic(questions[currentIndex].a)) {
                        box.classList.add('correct');
                    }
                });
                expText.innerText = `Dikkat: Muzâf (Tamlanan) kelimede "Elif-Lam" (ال) takısı olmaz.`;
                expText.style.display = "block";
                actionBtn.innerText = "Devam Et";
                actionBtn.style.display = "inline-block";
            }
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                updateQuestion();
            } else {
                document.getElementById('quiz-part').style.display = "none";
                document.querySelector('.example-box').style.display = "none";
                document.getElementById('results').style.display = "block";
                document.getElementById('final-score').innerText = `Skor: ${score} / ${questions.length}`;
            }
        }

        updateQuestion();
    </script>
</body>
</html>

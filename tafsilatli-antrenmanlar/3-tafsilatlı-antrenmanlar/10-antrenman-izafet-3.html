<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Alıştırma 3: İzafe (Boşluk Doldurma) - Arapça Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Amiri&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f4f8; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        .exercise-container { width: 1000px; background: white; padding: 50px; border-radius: 50px; box-shadow: 0 25px 75px rgba(0,0,0,0.1); text-align: center; }
        
        .header { color: #d63031; font-size: 32px; font-weight: 600; margin-bottom: 40px; }
        
        .example-box { background: #f8f9fa; padding: 20px; border-radius: 20px; margin-bottom: 30px; font-size: 24px; color: #7f8c8d; }
        
        .question-box { font-family: 'Amiri', serif; font-size: 85px; color: #18395b; margin-bottom: 30px; direction: rtl; }
        
        /* Şıklar İçin Konteyner */
        .options-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; direction: rtl; }
        
        /* Şık Butonları */
        .option-btn {
            background: white;
            border: 4px solid #f0f4f8;
            border-radius: 25px;
            padding: 15px 40px;
            font-family: 'Amiri', serif;
            font-size: 60px;
            color: #18395b;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 200px;
        }

        .option-btn:hover { border-color: #2193b0; transform: translateY(-5px); }

        /* Doğru / Yanlış Renkleri */
        .option-btn.correct { border-color: #27ae60; background-color: #eafaf1; color: #27ae60; pointer-events: none; }
        .option-btn.wrong { border-color: #e74c3c; background-color: #fdedec; color: #e74c3c; pointer-events: none; opacity: 0.7; }
        .option-btn.disabled { pointer-events: none; opacity: 0.5; }

        .meaning-box { font-size: 35px; color: #2980b9; font-weight: 600; min-height: 50px; margin-bottom: 20px; opacity: 0; transition: 0.3s; }
        .meaning-box.show { opacity: 1; }

        .explanation { color: #e67e22; font-weight: 600; font-size: 26px; display: none; margin-bottom: 30px; }
        
        .action-btn { 
            padding: 25px 70px; font-size: 35px; border: none; 
            background-color: #2c3e50; color: white; border-radius: 20px; 
            cursor: pointer; transition: 0.3s; font-family: 'Poppins'; 
            display: none;
        }
        .action-btn:hover { background-color: #34495e; transform: scale(1.05); }

        .counter { margin-top: 25px; font-size: 30px; color: #7f8c8d; margin-bottom: 20px; }
        #results { display: none; }
        .score-text { font-size: 60px; color: #18395b; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div class="exercise-container" id="game-area">
        <div class="header">C- Doğru kelimeyi seçerek boşlukları doldurunuz:</div>
        
        <div class="example-box">
            💡 İpucu: Muzâf (Tamlanan) "Elif-Lam" (ال) almaz. Muzâfun İleyh (Tamlayan) ise esreli olur.
        </div>

        <div id="quiz-part">
            <div class="counter" id="progress">1 / 10</div>
            
            <div class="question-box" id="prompt-sentence"></div>
            
            <div class="options-container" id="options-container"></div>
            
            <div class="meaning-box" id="word-meaning"></div>
            
            <div class="explanation" id="exp-text"></div>
            
            <button class="action-btn" id="next-btn" onclick="nextQuestion()">Sıradaki</button>
        </div>

        <div id="results">
            <div class="score-text">Harika İş Çıkardın!</div>
            <div class="score-text" id="final-score">Skor: 0 / 10</div>
            <button class="action-btn" style="display:inline-block" onclick="location.href='/Users/azizavci/Desktop/arapca calisma portali/tafsilatli-antrenmanlar/3-tafsilatlı-antrenmanlar/10-antrenman-izafet-ezber.html'">Ezber Ödevine Geç</button>
        </div>
    </div>

    <script>
        const questions = [
            { 
                q: "قَلَمُ ....... قَصِيرٌ.", 
                opts: ["الْوَلَدُ", "الْوَلَدِ", "الْوَلَدَ"], 
                correct: 1, 
                tr: "Çocuğun kalemi kısadır.", 
                exp: "Muzâfun İleyh (Tamlayan) daima esreli (mecrur) olur." 
            },
            { 
                q: "....... الصَّفِّ مَفْتُوحٌ.", 
                opts: ["الْبَابُ", "بَابِ", "بَابُ"], 
                correct: 2, 
                tr: "Sınıfın kapısı açıktır.", 
                exp: "Muzâf (Tamlanan) 'Elif-Lam' (ال) takısı almaz ve tenvinsiz olur." 
            },
            { 
                q: "نَافِذَةُ ....... مَفْتُوحَةٌ.", 
                opts: ["الْغُرْفَةِ", "الْغُرْفَةُ", "الْغُرْفَةَ"], 
                correct: 0, 
                tr: "Odanın penceresi açıktır.", 
                exp: "Muzâfun İleyh daima esreli (mecrur) olur." 
            },
            { 
                q: "....... الْمُدَرِّسِ طَوِيلٌ.", 
                opts: ["قَلَمُ", "الْقَلَمُ", "قَلَمِ"], 
                correct: 0, 
                tr: "Öğretmenin kalemi uzundur.", 
                exp: "Muzâf 'Elif-Lam' (ال) takısı almaz." 
            },
            { 
                q: "حَدِيقَةُ ....... صَغِيرَةٌ.", 
                opts: ["الْبَيْتُ", "الْبَيْتَ", "الْبَيْتِ"], 
                correct: 2, 
                tr: "Evin bahçesi küçüktür.", 
                exp: "Muzâfun İleyh daima esreli olur." 
            },
            { 
                q: "سَبُّورَةُ ....... عَرِيضَةٌ.", 
                opts: ["الصَّفِّ", "الصَّفُّ", "الصَّفَّ"], 
                correct: 0, 
                tr: "Sınıfın tahtası enlidir.", 
                exp: "Muzâfun İleyh daima esreli olur." 
            },
            { 
                q: "....... التِّلْمِيذِ قَصِيرٌ.", 
                opts: ["الدَّرْسُ", "دَرْسِ", "دَرْسُ"], 
                correct: 2, 
                tr: "Öğrencinin dersi kısadır.", 
                exp: "Muzâf kelime 'Elif-Lam' takısı almaz." 
            },
            { 
                q: "كِتَابُ ....... سَمِيكٌ.", 
                opts: ["الطَّالِبَ", "الطَّالِبِ", "الطَّالِبُ"], 
                correct: 1, 
                tr: "Öğrencinin kitabı kalındır.", 
                exp: "Muzâfun İleyh daima esreli olur." 
            },
            { 
                q: "مِنْضَدَةُ ....... ثَقِيلَةٌ.", 
                opts: ["الْمَكْتَبِ", "الْمَكْتَبُ", "الْمَكْتَبَ"], 
                correct: 0, 
                tr: "Ofisin masası ağırdır.", 
                exp: "Muzâfun İleyh daima esreli olur." 
            },
            { 
                q: "سَيَّارَةُ ....... جَدِيدَةٌ.", 
                opts: ["الْمُدِيرُ", "الْمُدِيرَ", "الْمُدِيرِ"], 
                correct: 2, 
                tr: "Müdürün arabası yenidir.", 
                exp: "Muzâfun İleyh daima esreli olur." 
            }
        ];

        let currentIndex = 0;
        let score = 0;

        function updateQuestion() {
            const q = questions[currentIndex];
            document.getElementById('progress').innerText = `${currentIndex + 1} / ${questions.length}`;
            
            // Soruyu ekrana yazdır (Boşluk kısmı "......." olarak görünecek)
            document.getElementById('prompt-sentence').innerText = q.q;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = ""; 
            
            // Şıkları oluştur
            q.opts.forEach((opt, index) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });

            // Ekranı sıfırla
            document.getElementById('next-btn').style.display = "none";
            document.getElementById('word-meaning').classList.remove('show');
            document.getElementById('exp-text').style.display = "none";
        }

        function checkAnswer(selectedIndex, selectedBtn) {
            const q = questions[currentIndex];
            const allBtns = document.querySelectorAll('.option-btn');
            
            // Diğer şıklara tıklanmasını engelle
            allBtns.forEach(btn => btn.classList.add('disabled'));

            const meaningBox = document.getElementById('word-meaning');
            const expText = document.getElementById('exp-text');
            const nextBtn = document.getElementById('next-btn');

            // Cümleyi tamamlanmış haliyle göster
            document.getElementById('prompt-sentence').innerText = q.q.replace(".......", q.opts[q.correct]);

            meaningBox.innerText = `Anlamı: ${q.tr}`;
            meaningBox.classList.add('show');

            if (selectedIndex === q.correct) {
                selectedBtn.classList.remove('disabled');
                selectedBtn.classList.add('correct');
                score++;
            } else {
                selectedBtn.classList.remove('disabled');
                selectedBtn.classList.add('wrong');
                // Doğru olanı yeşil yakarak göster
                allBtns[q.correct].classList.remove('disabled');
                allBtns[q.correct].classList.add('correct');
                
                expText.innerText = `Dikkat: ${q.exp}`;
                expText.style.display = "block";
            }

            nextBtn.style.display = "inline-block";
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                updateQuestion();
            } else {
                document.getElementById('quiz-part').style.display = "none";
                document.querySelector('.example-box').style.display = "none";
                document.getElementById('results').style.display = "block";
                document.getElementById('final-score').innerText = `Skor: ${score} / ${questions.length}`;
            }
        }

        // İlk soruyu başlat
        updateQuestion();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Pusula - Arapça Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f0f4f8; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 40px 20px; 
        }
        
        nav { 
            background-color: #2c3e50; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: inline-block; 
            width: 100%; 
            max-width: 1000px; 
            margin-bottom: 30px; 
            overflow: hidden; 
        }
        nav a { float: left; color: white; padding: 16px 20px; text-decoration: none; transition: 0.3s; font-weight: 600; }
        nav a:hover { background-color: #34495e; color: #3498db; }

        .container { 
            width: 100%; 
            max-width: 1000px; 
            background: white; 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.1); 
            text-align: center; 
        }

        /* Kapak Fotoğrafı Alanı */
        .cover-photo {
            width: 100%;
            height: 350px;
            background-color: #bdc3c7;
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            /* Resim eklenince çirkin durmaması için kesik çizgiyi kaldırdık (border: none; ile satır içinde ezilecek) */
            border: 2px dashed #95a5a6; 
        }

        .cover-text {
            color: #2c3e50;
            font-size: 24px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.8);
            padding: 15px 30px;
            border-radius: 15px;
        }

        /* Şema Yönlendirme Kartları */
        .cards-wrapper {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .schema-card {
            flex: 1;
            min-width: 300px;
            background: #ffffff;
            border: 3px solid #ecf0f1;
            border-radius: 20px;
            padding: 40px 20px;
            text-decoration: none;
            color: #2c3e50;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .schema-card:hover {
            border-color: #3498db;
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(52, 152, 219, 0.15);
        }

        .icon {
            font-size: 50px;
        }

        .card-title {
            font-size: 22px;
            font-weight: 600;
            line-height: 1.4;
        }

        @media (max-width: 768px) {
            .cards-wrapper { flex-direction: column; }
            .cover-photo { height: 200px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="ana-sayfa.html">← Ana Sayfaya Dön</a>
    </nav>

    <div class="container">
        
        <div class="cover-photo" style="background-image: url('görseller/pusula-anasayfa.png'); border: none;">
        </div>

        <div class="cards-wrapper">
            
            <a href="gorunur-ogrenme.html" class="schema-card">
                <div class="icon">👁️‍🗨️</div>
                <div class="card-title">Görünür Öğrenme</div>
            </a>

            <a href="zihin-ve-dil-ustaligi.html" class="schema-card">
                <div class="icon">🧭</div>
                <div class="card-title">Pusula: Öğrenimde Zihin ve Dil Ustalığı</div>
            </a>

        </div>

    </div>

</body>
</html>

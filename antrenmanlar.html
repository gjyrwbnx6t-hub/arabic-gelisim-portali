<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Antrenmanlar - Arapça Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Ana sayfadaki genel arka plan ve yazı ayarları */
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f0f4f8; 
            margin: 0; 
            padding: 20px; 
            text-align: center; 
            color: #333;
        }

        /* Ana sayfadaki menü stili */
        nav { 
            background-color: #2c3e50; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: inline-block; 
            width: 100%; 
            max-width: 1000px; 
            margin-bottom: 30px; 
            overflow: hidden;
        }
        nav a { 
            float: left; 
            color: white; 
            padding: 14px 20px; 
            text-decoration: none; 
            font-size: 17px;
            transition: 0.3s; 
        }
        nav a:hover {
            background-color: #34495e;
            color: #3498db;
        }

        /* Ana sayfadaki başlık rengi */
        h1 { color: #18395b; margin-bottom: 40px; }

        /* Kapak Fotoğrafı Stilleri */
        .banner-container {
            width: 100%;
            max-width: 1000px;
            height: 300px;
            margin: 0 auto 30px auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .banner-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 25px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Ana sayfadaki beyaz kutu (Card) tasarımı */
        .training-card {
            background: white; 
            border-radius: 15px;
            padding: 40px 20px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        /* Üzerine gelince oluşan kalkma ve mavi çerçeve efekti */
        .training-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.15);
            border-color: #2193b0; 
        }

        .icon {
            font-size: 40px;
            display: block;
            margin-bottom: 15px;
        }

        .training-card h3 { margin: 0; font-size: 24px; letter-spacing: 1px; color: #18395b; }

        @media (max-width: 600px) { 
            .grid-container { grid-template-columns: 1fr; } 
            .banner-container { height: 200px; }
        }
    </style>
</head>
